<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,wght@0,300;0,700;1,300;1,700&display=swap');

  :root {
    --bg: #0f0f0e;
    --surface: #1a1a18;
    --surface2: #242420;
    --border: #2e2e2a;
    --text: #e8e6de;
    --muted: #6b6860;
    --accent: #c8f04a;
    --hard: #f07a4a;
    --easy: #4af0a8;
    --rest: #6b7cf0;
    --test: #f0c84a;
    --red: #f04a6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 32px 20px 90px;
    min-height: 100vh;
  }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    z-index: 999;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; }

  /* ── HEADER ── */
  header { margin-bottom: 32px; }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(26px, 6vw, 48px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -1px;
  }
  h1 em { color: var(--accent); font-style: italic; }
  .subtitle { color: var(--muted); font-size: 11px; letter-spacing: 0.06em; margin-top: 8px; }
  .progress-wrap {
    margin-top: 14px;
    background: var(--surface2);
    border-radius: 2px; height: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.5s ease; width: 0%;
  }
  .progress-label { font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: 0.05em; }

  /* ── TEMPO BOX ── */
  .tempo-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
  }
  .tempo-item { display: flex; flex-direction: column; gap: 3px; }
  .tempo-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
  .tempo-val { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; }
  .tempo-feel { font-size: 10px; color: var(--muted); }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── PHASE TITLE ── */
  .phase-title {
    font-family: 'Fraunces', serif;
    font-size: 16px; font-weight: 300; font-style: italic;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin: 32px 0 14px;
    letter-spacing: 0.02em;
  }

  /* ── WEEK ── */
  .week {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .week:hover { border-color: #444; }
  .week.rest-week { border-left: 3px solid var(--rest); }
  .week.test-week { border-left: 3px solid var(--test); }
  .week.has-data { border-left: 3px solid var(--accent); }

  .week-head {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 10px; align-items: center;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .wnum { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--muted); }
  .week.open .wnum { color: var(--accent); }
  .week.rest-week .wnum { color: var(--rest); }
  .week.test-week .wnum { color: var(--test); }
  .wmeta { display: flex; flex-direction: column; gap: 2px; }
  .wlabel { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .wsummary { font-size: 12px; }
  .wtoggle { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
  .week.open .wtoggle { transform: rotate(180deg); }
  .week-body { display: none; border-top: 1px solid var(--border); }
  .week.open .week-body { display: block; }

  /* ── DAY ROW ── */
  .day-row {
    display: grid;
    grid-template-columns: 82px 1fr;
    gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .day-row:last-child { border-bottom: none; }
  .day-left { display: flex; flex-direction: column; gap: 5px; padding-top: 2px; }
  .day-name { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .stype { display: flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
  .day-right { display: flex; flex-direction: column; gap: 5px; }
  .sdesc { font-size: 12px; line-height: 1.45; }
  .snotes { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.4; }

  .log-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 6px;
  }
  .log-field { display: flex; flex-direction: column; gap: 2px; }
  .log-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  input[type="text"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 7px;
    width: 100%; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 34px; grid-column: 1 / -1; }

  .done-btn {
    grid-column: 1 / -1;
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    padding: 6px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .done-btn:hover { border-color: var(--accent); color: var(--accent); }
  .done-btn.done { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 500; }

  /* ── SAVE BAR ── */
  .save-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; gap: 8px; align-items: center;
    z-index: 100;

  .save-btn {
    background: var(--accent);
    border: none; border-radius: 2px;
    color: var(--bg);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em;
    padding: 9px 18px; text-transform: uppercase;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-msg { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; flex: 1; }

  @media (max-width: 500px) {
    .day-row { grid-template-columns: 1fr; }
    .day-left { flex-direction: row; align-items: center; gap: 10px; }
  }
</style>

let supabase = null;
let logData = {};
let dirty = false;

async function initSupabase() {
  setLoader(true, 'Kobler til database...');
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await fetchData();
    document.getElementById('app').style.display = 'block';
    setLoader(false);
  } catch(e) {
    document.getElementById('loaderMsg').textContent = 'Feil: ' + e.message;
  }
}

function setLoader(show, msg) {
  const el = document.getElementById('loader');
  if (show) {
    el.classList.remove('hidden');
    if (msg) document.getElementById('loaderMsg').textContent = msg;
  } else {
    el.classList.add('hidden');
  }
}

// ═══════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════
function dayKey(weekN, dayName) {
  return `w${weekN}_${dayName.replace(/\s/g,'')}`;
}

async function fetchData() {
  const { data, error } = await supabase
    .from('treningslogg')
    .select('*');
  if (error) throw error;
  logData = {};
  (data || []).forEach(row => {
    logData[row.dag_key] = {
      time: row.tid || '',
      pace: row.tempo || '',
      note: row.notat || '',
      done: !!row.fullfort,
    };
  });
  render();
}

async function upsertDay(key, fields) {
  const { error } = await supabase
    .from('treningslogg')
    .upsert({ dag_key: key, ...fields }, { onConflict: 'dag_key' });
  if (error) throw error;
}

async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '...';
  setStatus('Lagrer...');

  try {
    const upserts = [];
    WEEKS.forEach(phase => phase.weeks.forEach(week => {
      week.days.forEach(day => {
        if (day.type === 'rest') return;
        const k = dayKey(week.n, day.name);
        const tEl = document.getElementById(`t_${k}`);
        const pEl = document.getElementById(`p_${k}`);
        const nEl = document.getElementById(`n_${k}`);
        if (!logData[k]) logData[k] = {};
        if (tEl) logData[k].time = tEl.value;
        if (pEl) logData[k].pace = pEl.value;
        if (nEl) logData[k].note = nEl.value;
        upserts.push({
          dag_key: k,
          tid: logData[k].time || null,
          tempo: logData[k].pace || null,
          notat: logData[k].note || null,
          fullfort: !!logData[k].done,
        });
      });
    }));

    const { error } = await supabase
      .from('treningslogg')
      .upsert(upserts, { onConflict: 'dag_key' });
    if (error) throw error;

    dirty = false;
    setStatus('Lagret ✓');
    updateWeekStyles();
    updateProgress();
  } catch(e) {
    setStatus('Feil: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Lagre';
}

async function toggleDone(weekN, dayName) {
  const k = dayKey(weekN, dayName);
  if (!logData[k]) logData[k] = {};
  logData[k].done = !logData[k].done;

  const btn = document.getElementById(`done_${k}`);
  if (btn) {
    btn.className = 'done-btn' + (logData[k].done ? ' done' : '');
    btn.textContent = logData[k].done ? '✓ Fullført' : 'Merk fullført';
  }

  try {
    await upsertDay(k, {
      tid: logData[k].time || null,
      tempo: logData[k].pace || null,
      notat: logData[k].note || null,
      fullfort: logData[k].done,
    });
    setStatus('Lagret ✓');
  } catch(e) {
    setStatus('Feil: ' + e.message);
  }

  updateWeekStyles();
  updateProgress();
}

// ═══════════════════════════════════════
// UI
// ═══════════════════════════════════════
function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
  if (msg === 'Lagret ✓') {
    setTimeout(() => {
      document.getElementById('statusMsg').textContent = dirty ? 'Ulagrede endringer' : '—';
    }, 2000);
  }
}

function markDirty() {
  dirty = true;
  setStatus('Ulagrede endringer');
}

function updateWeekStyles() {
  WEEKS.forEach(phase => phase.weeks.forEach(week => {
    const el = document.getElementById(`week_${week.n}`);
    if (!el) return;
    const hasData = week.days.some(d => {
      if (d.type === 'rest') return false;
      const k = dayKey(week.n, d.name);
      return logData[k] && (logData[k].done || logData[k].time || logData[k].pace || logData[k].note);
    });
    el.classList.toggle('has-data', hasData && !week.rest && !week.test);
  }));
}

function updateProgress() {
  let total = 0, done = 0;
  WEEKS.forEach(phase => phase.weeks.forEach(week => {
    week.days.forEach(day => {
      if (day.type === 'rest') return;
      total++;
      const k = dayKey(week.n, day.name);
      if (logData[k] && logData[k].done) done++;
    });
  }));
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${done} av ${total} økter fullført (${pct}%)`;
}

function toggleWeek(n) {
  document.getElementById(`week_${n}`).classList.toggle('open');
}

function render() {
  const container = document.getElementById('program');
  container.innerHTML = '';

  WEEKS.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = 'phase-title';
    ph.textContent = phase.phase;
    container.appendChild(ph);

    phase.weeks.forEach(week => {
      const el = document.createElement('div');
      el.className = 'week' + (week.rest ? ' rest-week' : '') + (week.test ? ' test-week' : '');
      el.id = `week_${week.n}`;

      const daysHTML = week.days.map(day => {
        const k = dayKey(week.n, day.name);
        const d = logData[k] || {};
        const col = TYPE_COLOR[day.type];
        const lbl = TYPE_LABEL[day.type];

        const logFields = day.type !== 'rest' ? `
          <div class="log-fields">
            <div class="log-field">
              <div class="log-lbl">Tid</div>
              <input type="text" id="t_${k}" value="${d.time||''}" placeholder="min" oninput="markDirty()">
            </div>
            <div class="log-field">
              <div class="log-lbl">Tempo</div>
              <input type="text" id="p_${k}" value="${d.pace||''}" placeholder="min/km" oninput="markDirty()">
            </div>
            <div class="log-field">
              <div class="log-lbl">Notat</div>
              <textarea id="n_${k}" placeholder="Hvordan gikk det?" oninput="markDirty()">${d.note||''}</textarea>
            </div>
            <button class="done-btn ${d.done?'done':''}" id="done_${k}" onclick="toggleDone(${week.n}, '${day.name}')">
              ${d.done ? '✓ Fullført' : 'Merk fullført'}
            </button>
          </div>` : '';

        return `
          <div class="day-row">
            <div class="day-left">
              <div class="day-name">${day.name}</div>
              <div class="stype"><div class="dot" style="background:${col}"></div><span style="color:${col}">${lbl}</span></div>
            </div>
            <div class="day-right">
              <div class="sdesc">${day.desc}</div>
              ${day.notes ? `<div class="snotes">${day.notes}</div>` : ''}
              ${logFields}
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="week-head" onclick="toggleWeek(${week.n})">
          <div class="wnum">${String(week.n).padStart(2,'0')}</div>
          <div class="wmeta">
            <div class="wlabel">${week.label}</div>
            <div class="wsummary">${week.summary}</div>
          </div>
          <div class="wtoggle">▾</div>
        </div>
        <div class="week-body">${daysHTML}</div>`;

      container.appendChild(el);
    });
  });

  updateWeekStyles();
  updateProgress();
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
initSupabase();
</script>
</body>
</html>
